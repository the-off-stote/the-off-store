<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | The Off Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 p-6 font-['Inter']">
    <div class="max-w-md mx-auto space-y-6">
        <h2 class="text-3xl font-black italic tracking-tighter uppercase text-blue-600">Verify Order</h2>
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border space-y-4">
            <div class="flex justify-between border-b pb-4">
                <div>
                    <p class="text-[10px] font-black text-gray-400 uppercase">Order ID</p>
                    <p id="dispId" class="font-black text-sm"></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black text-gray-400 uppercase">Amount</p>
                    <p id="dispTotal" class="font-black text-xl text-blue-600"></p>
                </div>
            </div>
            <p id="dispDetails" class="text-xs font-bold text-gray-600"></p>
        </div>

        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-xl">
            <p class="text-[10px] font-black text-yellow-800 uppercase">Instruction</p>
            <p class="text-xs font-bold text-yellow-700">Must mention Order ID in Payment Note to confirm.</p>
        </div>

        <button onclick="payNow()" class="w-full bg-black text-white py-5 rounded-full font-black uppercase tracking-widest shadow-xl">Pay via UPI Now</button>
    </div>

    <script>
        const order = JSON.parse(localStorage.getItem('pendingOrder'));
        document.getElementById('dispId').innerText = order.id;
        document.getElementById('dispTotal').innerText = `₹${order.total}`;
        document.getElementById('dispDetails').innerText = `${order.name} (Qty: ${order.qty})`;

        function payNow() {
            // Updated with your UPI ID
            const upiUrl = `upi://pay?pa=8917228811@axl&pn=TheOffStore&am=${order.total}&tn=${order.id}&cu=INR`;
            
            // Save to history before leaving
            let history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
            history.push({...order, date: new Date().toLocaleDateString()});
            localStorage.setItem('orderHistory', JSON.stringify(history));
            
            window.location.href = upiUrl;
        }
    </script>
</body>
</html>
