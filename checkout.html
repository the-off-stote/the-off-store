<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | The Off Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .input-field { border: 2px solid #f1f5f9; transition: all 0.3s; }
        .input-field:focus { border-color: #2563eb; background: white; outline: none; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 bg-white border-b sticky top-0 z-50 flex items-center justify-between">
        <button onclick="window.history.back()" class="text-xl font-black">←</button>
        <h1 class="font-black text-sm tracking-widest uppercase text-gray-400">Secure Checkout</h1>
        <div class="w-6"></div>
    </header>

    <main class="p-6 max-w-md mx-auto space-y-6">
        
        <div class="bg-blue-600 rounded-[2.5rem] p-7 text-white shadow-2xl shadow-blue-100 relative overflow-hidden">
            <div class="flex justify-between items-start mb-6 relative z-10">
                <span id="orderIdDisp" class="text-[9px] font-black bg-white/20 px-3 py-1.5 rounded-full border border-white/20 uppercase tracking-widest italic">OFF-WAITING</span>
                <p class="text-[9px] font-black uppercase tracking-widest opacity-60">Verified Order</p>
            </div>
            
            <h2 id="productNameDisp" class="text-2xl font-black leading-tight tracking-tighter uppercase mb-6">Loading Gear...</h2>
            
            <div class="flex justify-between items-end border-t border-white/20 pt-5 relative z-10">
                <div>
                    <p class="text-[9px] font-black opacity-60 uppercase mb-1">Total Amount</p>
                    <p id="totalPriceDisp" class="text-4xl font-black tracking-tighter">₹0</p>
                </div>
                <div class="bg-white text-blue-600 px-4 py-2 rounded-2xl font-black text-xs italic">
                    Qty: <span id="qtyDisp">1</span>
                </div>
            </div>
            <div class="absolute -right-6 -bottom-6 opacity-10 text-9xl font-black italic select-none">OFF</div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-7 border border-gray-100 shadow-sm space-y-5">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 border-b pb-3">Shipping Details</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black uppercase ml-1 text-gray-400">Receiver Name</label>
                    <input type="text" id="custName" placeholder="Full name for courier" class="input-field w-full mt-1 p-4 bg-gray-50 rounded-2xl font-bold text-sm">
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase ml-1 text-gray-400">WhatsApp Phone</label>
                    <input type="tel" id="custPhone" placeholder="10-digit mobile" class="input-field w-full mt-1 p-4 bg-gray-50 rounded-2xl font-bold text-sm">
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase ml-1 text-gray-400">Full Address & Pincode</label>
                    <textarea id="custAddress" rows="3" placeholder="House/Flat No, Landmark, City, State, Pincode" class="input-field w-full mt-1 p-4 bg-gray-50 rounded-2xl font-bold text-sm"></textarea>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-yellow-50 border-2 border-yellow-100 p-4 rounded-3xl flex gap-3 items-center">
                <span class="text-xl">⚠️</span>
                <p class="text-[10px] font-bold text-yellow-800 leading-tight">
                    <span class="font-black uppercase tracking-widest block mb-1">Payment Rule</span>
                    Enter your Order ID in the UPI payment note for instant verification.
                </p>
            </div>

            <button onclick="handlePayment()" id="payBtn" class="w-full bg-black text-white py-6 rounded-full font-black text-lg uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                Pay Now via UPI
            </button>
        </div>
    </main>

    <script>
        // 1. DATA SYNC
        const order = JSON.parse(localStorage.getItem('pendingOrder'));
        
        if(!order) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('orderIdDisp').innerText = order.id;
            document.getElementById('productNameDisp').innerText = order.name;
            document.getElementById('totalPriceDisp').innerText = `₹${order.total}`;
            document.getElementById('qtyDisp').innerText = order.qty;
        }

        // 2. PAYMENT & GOOGLE SHEET SYNC
        async function handlePayment() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) {
                alert("Please fill in shipping details!");
                return;
            }

            const payBtn = document.getElementById('payBtn');
            payBtn.innerText = "Syncing with Google Sheets...";
            payBtn.disabled = true;

            const orderData = {
                orderId: order.id,
                name: order.name,
                qty: order.qty,
                total: order.total,
                customerName: name,
                customerPhone: phone,
                customerAddress: address
            };

            try {
                // YOUR GOOGLE SCRIPT URL
                const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyV8VMfgP38mp7JOzYDpA-Mc61CmU49kveyfpYX773GJQ0ZQwdGTgAFaXbCcFlFWc_9/exec';
                
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(orderData)
                });

                // Save to local history for 'history.html'
                let history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
                history.push({...orderData, date: new Date().toLocaleDateString()});
                localStorage.setItem('orderHistory', JSON.stringify(history));

                // LAUNCH UPI: 8917228811@axl
                const upiUrl = `upi://pay?pa=8917228811@axl&pn=TheOffStore&am=${order.total}&tn=${order.id}&cu=INR`;
                window.location.href = upiUrl;

                // Move to Success after payment launch
                setTimeout(() => {
                    window.location.href = 'success.html';
                }, 4000);

            } catch (error) {
                alert("Network issue. Check your connection!");
                payBtn.innerText = "Pay Now via UPI";
                payBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
